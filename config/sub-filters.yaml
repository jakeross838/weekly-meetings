# Sub Filter List — non-sub entries to remove from `crews_clean` arrays
#
# Three buckets:
#   - hard_delete:          scraper artifacts, equipment, finance — drop entirely
#   - external_entities:    utilities (treat as their own entity later)
#   - inspection_authorities: building departments (track inspection events, not as a sub)
#
# Format per entry:
#   name:        verbatim string from crews_clean
#   log_count:   how many logs reference this entry
#   sample:      first ~120 chars of one notes_full where this entry appeared
#   reason:      why it is being filtered

