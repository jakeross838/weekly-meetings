# Phase Keyword Library — covers all 67 phase codes (15 stages)
#
# Keywords are case-insensitive regex snippets matched against:
#   notes_full + notes + activity + parent_group_activities (joined into one searchable string)
#
# Specificity wins: longer, multi-token patterns outrank shorter ones during classification.
# tag_hints fire only when the parent_group_activities tag is present AND no higher-confidence text match outranks it.
#
# Schema per phase:
#   code:       "X.Y" canonical phase code from SPEC PART 3
#   name:       human-readable phase name
#   stage:      stage number (1-15) and stage label
#   keywords:   list of regex snippets (action verb + material/element)
#   tag_hints:  optional list of parent_group_activities strings that strongly imply this phase
#   notes:      optional free-text rationale

# ==========================================================================
# STAGE 1 — PRE-CONSTRUCTION & SITE
# ==========================================================================

phases:

  - code: "1.1"
    name: "Permits & Plan Review"
    stage: 1
    stage_label: "Pre-Construction & Site"
    keywords:
      - 'permit\s+(application|review|issued|pulled|submit)'
      - 'plan review'
      - 'plan revision'
      - 'plan check'
      - 'building permit'
      - 'pre.{0,3}construction\s+meeting'
    tag_hints:
      - "Plan Review"
      - "Pre-Construction"
      - "Estimating"
      - "Finalize Contract"

  - code: "1.2"
    name: "Site Clearing / Demo"
    stage: 1
    stage_label: "Pre-Construction & Site"
    keywords:
      - '\bdemo(lition)?\b'
      - 'tree\s+(remov|cut|clear)'
      - 'site\s+(clearing|cleared|clear)'
      - 'land\s+clear'
      - 'stumps?\b'
      - 'haul.{0,4}(off|away|debris)'

  - code: "1.3"
    name: "Temporary Fencing & Erosion Control"
    stage: 1
    stage_label: "Pre-Construction & Site"
    keywords:
      - 'silt\s+fenc'
      - 'erosion\s+control'
      - 'temporary\s+fenc'
      - 'construction\s+fenc'

  - code: "1.4"
    name: "Site Grading & Pad Prep"
    stage: 1
    stage_label: "Pre-Construction & Site"
