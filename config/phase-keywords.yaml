      - '\bgrading\b'
      - 'pad\s+prep'
      - 'fill\s+dirt'
      - 'compact(ed|ion)?'
      - 'rough\s+grade'
      - 'fine\s+grade'
      - 'site\s+work\s+(prep|grade)'
      - 'final\s+grade'
    tag_hints:
      - "Site Work"

  - code: "1.5"
    name: "Surveying & Layout"
    stage: 1
    stage_label: "Pre-Construction & Site"
    keywords:
      - '\bsurvey(or|ing)?\b'
      - 'layout\s+(stak|line|building)'
      - 'form\s+board\s+survey'
      - 'elevation\s+certificate'
      - 'staking\b'

